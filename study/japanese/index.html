<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>一周旅行日语交互教程</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">7-Day Travel Japanese</p>
        <h1>一周旅行日语</h1>
      </div>
      <div class="progress-wrap" aria-label="学习进度">
        <span id="progressText">0%</span>
        <div class="progress-track"><div id="progressBar"></div></div>
        <span id="speechStatus" class="speech-status" aria-live="polite">朗读待命</span>
      </div>
    </header>

    <main class="app-shell">
      <section class="stage">
        <div class="scene-panel">
          <canvas id="sceneCanvas" width="920" height="380" aria-label="旅行场景手绘图"></canvas>
          <div class="scene-copy">
            <p id="sceneKicker">Day 1</p>
            <h2 id="dayTitle">机场与问候</h2>
            <p id="dayGoal">先学会打招呼、感谢、求助，以及入境时最常用的句子。</p>
          </div>
        </div>

        <div class="day-tabs" id="dayTabs" aria-label="一周课程切换"></div>
      </section>

      <section class="workbench">
        <aside class="daily-card">
          <div class="section-heading">
            <span>今日目标</span>
            <button id="resetBtn" class="icon-btn" title="重置进度" aria-label="重置进度">↺</button>
          </div>
          <ol id="taskList" class="task-list"></ol>
        </aside>

        <section class="lesson-card">
          <div class="section-heading">
            <span>核心短句</span>
            <div class="mode-switch" role="group" aria-label="显示模式">
              <button class="mode active" data-mode="all">全部</button>
              <button class="mode" data-mode="kana">假名</button>
              <button class="mode" data-mode="romaji">罗马音</button>
            </div>
          </div>
          <div id="phraseGrid" class="phrase-grid"></div>
        </section>
      </section>

      <section class="study-grid">
        <section class="lesson-card">
          <div class="section-heading">
            <span>今日单词</span>
            <button id="vocabReview" class="small-btn">随机复习</button>
          </div>
          <div id="vocabGrid" class="vocab-grid"></div>
        </section>

        <section class="lesson-card">
          <div class="section-heading">
            <span>迷你语法</span>
            <button id="grammarSpeak" class="small-btn">读例句</button>
          </div>
          <div id="grammarPanel" class="grammar-panel"></div>
        </section>
      </section>

      <section class="ai-panel">
        <div class="section-heading">
          <span>AI 随机拓展</span>
          <span id="aiStatus" class="ai-status">未连接</span>
        </div>
        <div class="ai-controls">
          <label>
            AI 代理地址
            <input id="aiProxyUrl" type="url" placeholder="https://your-worker.workers.dev" autocomplete="off" />
          </label>
          <label>
            OpenRouter Key（本机备用）
            <input id="openrouterKey" type="password" placeholder="sk-or-v1-..." autocomplete="off" />
          </label>
          <label>
            免费模型
            <select id="openrouterModel">
              <option value="deepseek/deepseek-chat-v3-0324:free">deepseek/deepseek-chat-v3-0324:free</option>
            </select>
          </label>
          <label>
            场景
            <select id="aiScenario">
              <option value="跟日本店员交流">跟日本店员交流</option>
              <option value="在车站问路和换乘">在车站问路和换乘</option>
              <option value="餐厅点餐和表达忌口">餐厅点餐和表达忌口</option>
              <option value="酒店入住和寄存行李">酒店入住和寄存行李</option>
              <option value="购物退税和付款">购物退税和付款</option>
              <option value="身体不舒服和紧急求助">身体不舒服和紧急求助</option>
            </select>
          </label>
          <label>
            难度
            <select id="aiLevel">
              <option value="零基础">零基础</option>
              <option value="入门进阶">入门进阶</option>
              <option value="旅行实战">旅行实战</option>
            </select>
          </label>
        </div>
        <div class="ai-actions">
          <button id="saveAiSettings" class="small-btn">保存设置</button>
          <button id="loadFreeModels" class="small-btn">加载免费模型</button>
          <button id="generateAiLesson" class="primary-btn">生成随机内容</button>
        </div>
        <div id="aiResult" class="ai-result">
          <p class="empty-state">配置 AI 代理后会调用真实大模型；没有代理或 Key 时，也会使用本地随机生成器生成新的短句、单词、语法和对话练习。</p>
        </div>
      </section>

      <section class="practice-grid">
        <div class="practice-panel">
          <div class="section-heading">
            <span>假名速记</span>
            <button id="kanaShuffle" class="small-btn">换一组</button>
          </div>
          <div id="kanaDeck" class="kana-deck"></div>
        </div>

        <div class="practice-panel">
          <div class="section-heading">
            <span>场景对话</span>
            <button id="dialogNext" class="small-btn">下一题</button>
          </div>
          <p id="dialogPrompt" class="dialog-prompt"></p>
          <div id="dialogChoices" class="choice-list"></div>
          <p id="dialogFeedback" class="feedback" aria-live="polite"></p>
        </div>

        <div class="practice-panel">
          <div class="section-heading">
            <span>快速测验</span>
            <button id="quizNext" class="small-btn">下一题</button>
          </div>
          <p id="quizQuestion" class="dialog-prompt"></p>
          <div id="quizChoices" class="choice-list"></div>
          <p id="quizFeedback" class="feedback" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="./config.local.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
